name: Fetch Daily Corrections from Cologne

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Calculate yesterday's date
        id: date
        run: |
          YESTERDAY=$(date -d "yesterday" +%Y%m%d)
          YESTERDAY_FORMATTED=$(date -d "yesterday" +%Y-%m-%d)
          echo "date=$YESTERDAY" >> $GITHUB_OUTPUT
          echo "date_formatted=$YESTERDAY_FORMATTED" >> $GITHUB_OUTPUT

      - name: Run fetch script
        run: ./fetch_yesterday_cfr.sh

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add daily/${{ steps.date.outputs.date }}/
          git diff --staged --stat || true
          git commit -m "[CRON] daily corrections for ${{ steps.date.outputs.date_formatted }}" || echo "No changes to commit"

      - name: Push changes
        run: git push

      - name: Create GitHub Issue if corrections exist
        if: success()
        run: |
          CORRECTION_FILE="daily/${{ steps.date.outputs.date }}/correctionform-${{ steps.date.outputs.date }}.txt"
          if [ -s "$CORRECTION_FILE" ]; then
            TITLE="Daily Corrections - ${{ steps.date.outputs.date_formatted }}"
            EXISTING=$(curl -s "https://api.github.com/repos/${{ github.repository }}/issues?state=all&labels=daily-corrections" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" | jq -r '.[] | select(.title == "'"$TITLE"'") | .number')
            if [ -n "$EXISTING" ]; then
              echo "Issue with title '$TITLE' already exists (#$EXISTING), skipping..."
            else
              CONTENT=$(cat "$CORRECTION_FILE" | sed '/^-*$/d' | jq -Rs .)
              curl -s -X POST https://api.github.com/repos/${{ github.repository }}/issues \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                -H "Content-Type: application/json" \
                -d "{\"title\": \"$TITLE\", \"body\": $CONTENT, \"labels\": [\"daily-corrections\"]}"
              echo "Created issue: $TITLE"
            fi
          else
            echo "No corrections to create issue for"
          fi